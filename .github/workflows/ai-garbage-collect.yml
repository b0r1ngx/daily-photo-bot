name: AI Garbage Collection

on:
  schedule:
    - cron: '0 2 * * 0' # Run every Sunday at 2:00 AM
  workflow_dispatch: # Allow manual triggering

jobs:
  ai-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Example: Using Claude Code CLI for autonomous garbage collection
      # Replace this with your preferred agent CLI (Copilot CLI, OpenCode, etc.)
      - name: Run AI Garbage Collection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx @anthropic-ai/claude-code \
            --prompt "Scan the src/ directory for unused exports, dead code, and duplicated logic. Check docs/plans/garbage-collection.md for any known tech debt. Refactor the code to fix these issues without breaking existing tests. Do not add new features. Run 'npm run test' to verify." \
            --auto-approve

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: AI Garbage Collection"
          title: "🤖 Clean up AI slop and dead code"
          body: |
            This is an automated PR generated by the AI Garbage Collection workflow.
            
            **Changes:**
            - Removed unused exports.
            - Cleaned up dead code.
            - Addressed minor technical debt.
            
            Please review the changes to ensure business logic remains intact.
          branch: "ai-gc-cleanup"
          labels: "refactor, automated"
